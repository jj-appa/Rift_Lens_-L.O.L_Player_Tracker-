name: rift-lens

services:
  backend:
    build: ./backend
    image: rift-lens-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:8080

  frontend:
    build: ./frontend
    image: rift-lens-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
